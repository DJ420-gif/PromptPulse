name: Auto Update Dates Monthly

on:
  schedule:
    - cron: '0 0 1 * *'  # Runs automatically on 1st of every month at midnight UTC
  workflow_dispatch:      # Also lets you trigger it manually anytime from GitHub

jobs:
  update-dates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Get current and previous month
        id: dates
        run: |
          echo "CURR_MONTH=$(date +"%B")" >> $GITHUB_ENV
          echo "CURR_YEAR=$(date +"%Y")" >> $GITHUB_ENV
          echo "PREV_MONTH=$(date -d 'last month' +"%B")" >> $GITHUB_ENV
          echo "PREV_YEAR=$(date -d 'last month' +"%Y")" >> $GITHUB_ENV

      - name: Show what will be updated
        run: |
          echo "🔄 Replacing: $PREV_MONTH $PREV_YEAR → $CURR_MONTH $CURR_YEAR"
          echo "📁 Files that will change:"
          grep -rl "$PREV_MONTH $PREV_YEAR" --include="*.html" . | head -30 || echo "No files found with old date"

      - name: Update dates in all HTML files
        run: |
          find . -name "*.html" -exec sed -i \
            "s/$PREV_MONTH $PREV_YEAR/$CURR_MONTH $CURR_YEAR/g" {} +
          echo "✅ All HTML files updated"

      - name: Update dates in all CSS files (if any dates exist)
        run: |
          find . -name "*.css" -exec sed -i \
            "s/$PREV_MONTH $PREV_YEAR/$CURR_MONTH $CURR_YEAR/g" {} +

      - name: Update dates in all JS files (if any dates exist)
        run: |
          find . -name "*.js" -exec sed -i \
            "s/$PREV_MONTH $PREV_YEAR/$CURR_MONTH $CURR_YEAR/g" {} +

      - name: Update sitemap lastmod dates
        run: |
          TODAY=$(date +"%Y-%m-%d")
          find . -name "sitemap.xml" -exec sed -i \
            "s/<lastmod>[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}<\/lastmod>/<lastmod>$TODAY<\/lastmod>/g" {} +
          echo "✅ Sitemap dates updated to $TODAY"

      - name: Check if anything changed
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "PromptPulse Date Bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "🤖 Auto update: $PREV_MONTH $PREV_YEAR → $CURR_MONTH $CURR_YEAR"
          git push
          echo "✅ Changes committed and pushed successfully"

      - name: Nothing to update
        if: steps.changes.outputs.changed == 'false'
        run: echo "✅ All dates already current — nothing to update"
