name: AI HTML Auditor
on: 
  push:
    paths:
      - '**.html'
  pull_request:
    paths:
      - '**.html'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SDK
        run: pip install google-genai

      - name: Identify Changed Files
        id: changed-files
        run: |
          # Robust check for new vs modified files to prevent Exit Code 1
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            FILES=$(git diff --name-only HEAD~1 HEAD | grep '\.html$' || true)
          else
            FILES=$(git ls-files | grep '\.html$' || true)
          fi
          echo "html_files=$FILES" >> $GITHUB_OUTPUT

      - name: Run AI Audit
        if: steps.changed-files.outputs.html_files != ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/ai_audit.py ${{ steps.changed-files.outputs.html_files }} > audit_report.md
          cat audit_report.md >> $GITHUB_STEP_SUMMARY
